<div *ngIf="loading">Loading photos...</div>

<div *ngIf="!loading && photos.length > 0" class="photo-grid">
  <div *ngFor="let photo of photos" class="photo-item">
    <img [src]="'https://picsum.photos/150?random=' + photo.id" [alt]="photo.title" width="150" height="150" />
    <p>{{photo.title}}</p>
  </div>
</div>
<div *ngIf="!loading && photos.length === 0">No photos found.</div>
<button (click)="back()">Back</button>
